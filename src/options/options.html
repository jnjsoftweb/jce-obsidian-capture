<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Web Capture 설정</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">
    <h1>설정</h1>

    <section>
      <h2>Obsidian Vault 폴더</h2>
      <button id="selectFolder">Vault 폴더 선택</button>
      <p id="folderStatus">선택된 폴더 없음 — <span id="vaultName"></span></p>
    </section>

    <section>
      <h2>저장 하위 폴더</h2>
      <input
        type="text"
        id="subFolder"
        placeholder="예: Attachments/Screenshots (비워두면 WebCaptures/YYYY-MM)"
      />
    </section>

    <section>
      <h2>이미지 형식</h2>
      <select id="imageFormat">
        <option value="png">PNG</option>
        <option value="jpeg">JPG</option>
        <option value="webp">WEBP</option>
      </select>
    </section>

    <section>
      <h2>캡처 옵션</h2>
      <label>
        <input type="checkbox" id="useScroll" />
        scroll 사용 (전체 페이지 캡처)
      </label>
    </section>
  </div>

  <script type="module" src="./options.ts"></script>
</body>
</html>
